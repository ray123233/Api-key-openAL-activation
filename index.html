<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Инструкция для покупателей</title>
    <style>
      :root {
        --bg: #f6efe3;
        --bg-strong: #efe3ce;
        --surface: rgba(255, 252, 246, 0.84);
        --text: #20170f;
        --muted: #5e4a37;
        --accent: #c65b1d;
        --accent-dark: #8f3611;
        --line: rgba(32, 23, 15, 0.12);
        --shadow: 0 24px 60px rgba(53, 28, 5, 0.14);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(198, 91, 29, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(120, 77, 35, 0.14), transparent 24%),
          linear-gradient(180deg, var(--bg) 0%, #fffaf3 52%, var(--bg-strong) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(32, 23, 15, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(32, 23, 15, 0.03) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 85%);
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        padding-right: 180px;
        background:
          linear-gradient(135deg, rgba(255, 250, 243, 0.9), rgba(255, 243, 224, 0.94));
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -60px -70px auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(198, 91, 29, 0.28), transparent 68%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px solid rgba(143, 54, 17, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        color: var(--accent-dark);
      }

      .author-badge {
        position: absolute;
        top: 18px;
        right: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid rgba(143, 54, 17, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
        backdrop-filter: blur(8px);
      }

      h1,
      h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 0.98;
        letter-spacing: 0;
      }

      h1 {
        max-width: 640px;
        margin-top: 18px;
        font-size: clamp(42px, 7vw, 78px);
      }

      .hero p {
        max-width: 640px;
        margin: 18px 0 0;
        font-size: clamp(16px, 2vw, 20px);
        line-height: 1.55;
        color: var(--muted);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button-primary {
        color: #fff7ef;
        background: linear-gradient(135deg, var(--accent), #df7e2e);
      }

      .button-secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.66);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      .meta-item {
        min-height: 94px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 252, 246, 0.74);
        backdrop-filter: blur(10px);
      }

      .meta-label {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .meta-value {
        margin-top: 8px;
        font-size: 22px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .panel-main {
        padding: 24px;
      }

      .panel-side {
        padding: 20px;
      }

      .section-block + .section-block {
        margin-top: 26px;
        padding-top: 26px;
        border-top: 1px solid var(--line);
      }

      h2 {
        font-size: clamp(28px, 4vw, 42px);
        margin-bottom: 14px;
      }

      .section-body {
        font-size: 17px;
        line-height: 1.7;
        color: var(--muted);
      }

      .section-body p {
        margin: 0 0 12px;
      }

      .section-body ul,
      .section-body ol {
        margin: 12px 0 0;
        padding-left: 20px;
      }

      .section-body li + li {
        margin-top: 8px;
      }

      .section-body code,
      .tip code {
        padding: 2px 7px;
        border-radius: 999px;
        background: rgba(32, 23, 15, 0.08);
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.92em;
      }

      .section-body pre {
        margin: 14px 0;
        padding: 16px;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(32, 23, 15, 0.05);
      }

      .section-body pre code {
        display: block;
        padding: 0;
        border-radius: 0;
        background: transparent;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre;
      }

      .side-title {
        margin: 0 0 12px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .side-list,
      .mini-list {
        display: grid;
        gap: 10px;
      }

      .side-link,
      .tip {
        display: block;
        padding: 14px 15px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.62);
        text-decoration: none;
      }

      .side-link strong,
      .tip strong {
        display: block;
        font-size: 16px;
      }

      .side-link span,
      .tip span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.5;
      }

      .footer {
        margin-top: 18px;
        padding: 18px 20px 8px;
        font-size: 14px;
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .hero {
          padding-right: 18px;
          background:
            linear-gradient(135deg, rgba(255, 250, 243, 0.94), rgba(255, 243, 224, 0.97));
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1120px);
          padding-top: 10px;
        }

        .hero,
        .panel-main,
        .panel-side {
          padding: 18px;
        }

        .hero {
          padding-top: 64px;
          background:
            linear-gradient(135deg, rgba(255, 250, 243, 0.96), rgba(255, 243, 224, 0.98));
        }

        .author-badge {
          top: 16px;
          left: 18px;
          right: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="author-badge" id="author-badge"></div>
        <div class="eyebrow" id="eyebrow"></div>
        <h1 id="title"></h1>
        <p id="subtitle"></p>
        <div class="hero-actions">
          <a class="button button-primary" id="primary-link" href="#"></a>
          <a class="button button-secondary" id="secondary-link" href="#instructions"></a>
        </div>
        <div class="meta-grid" id="meta-grid"></div>
      </section>

      <section class="layout">
        <article class="panel panel-main">
          <div id="instructions"></div>
        </article>

        <aside class="panel panel-side">
          <p class="side-title">Быстрые переходы</p>
          <div class="side-list" id="quick-links"></div>
        </aside>
      </section>
    </main>

    <script src="./site-content.js?v=20260712-2"></script>
    <script>
      const content = window.BUYER_GUIDE;

      function createElement(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (typeof text === "string") node.textContent = text;
        return node;
      }

      function renderMeta(items) {
        const host = document.getElementById("meta-grid");
        host.innerHTML = "";
        items.forEach((item) => {
          const card = createElement("div", "meta-item");
          card.appendChild(createElement("div", "meta-label", item.label));
          card.appendChild(createElement("div", "meta-value", item.value));
          host.appendChild(card);
        });
      }

      function renderSections(sections) {
        const host = document.getElementById("instructions");
        const quickLinks = document.getElementById("quick-links");
        host.innerHTML = "";
        quickLinks.innerHTML = "";

        sections.forEach((section) => {
          const block = createElement("section", "section-block");
          block.id = section.id;
          block.appendChild(createElement("h2", "", section.title));

          const body = createElement("div", "section-body");
          body.innerHTML = section.html;
          block.appendChild(body);
          host.appendChild(block);

          const link = createElement("a", "side-link");
          link.href = `#${section.id}`;
          link.innerHTML = `<strong>${section.title}</strong><span>${section.note}</span>`;
          quickLinks.appendChild(link);
        });
      }

      document.documentElement.lang = content.lang || "ru";
      document.title = content.pageTitle;
      document.getElementById("author-badge").textContent = content.author
        ? `Автор: ${content.author}`
        : "";
      document.getElementById("eyebrow").textContent = content.eyebrow;
      document.getElementById("title").textContent = content.title;
      document.getElementById("subtitle").textContent = content.subtitle;
      document.getElementById("primary-link").textContent = content.primaryAction.label;
      document.getElementById("primary-link").href = content.primaryAction.href;
      document.getElementById("secondary-link").textContent = content.secondaryActionLabel;

      renderMeta(content.meta);
      renderSections(content.sections);
    </script>
  </body>
</html>
