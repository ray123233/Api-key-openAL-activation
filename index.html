<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Инструкция для покупателей</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b0d;
        --bg-raised: #101418;
        --surface: #13181d;
        --surface-strong: #181f25;
        --text: #f4f7f8;
        --muted: #aab4bb;
        --accent: #53d6c5;
        --accent-strong: #24a99a;
        --warm: #f1bd63;
        --danger: #ff8c8c;
        --line: rgba(255, 255, 255, 0.1);
        --line-strong: rgba(83, 214, 197, 0.3);
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 20px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #0d1115 0%, var(--bg) 46%, #080a0c 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.72), transparent 72%);
      }

      a {
        color: inherit;
      }

      ::selection {
        color: #07110f;
        background: var(--accent);
      }

      .page {
        position: relative;
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        padding: 42px;
        padding-right: 290px;
        background: linear-gradient(125deg, #16201f 0%, #12171c 48%, #17161a 100%);
        box-shadow: var(--shadow);
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--warm), transparent 82%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: rgba(83, 214, 197, 0.08);
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
      }

      .hero-tools {
        position: absolute;
        top: 28px;
        right: 28px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .author-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(8, 11, 13, 0.46);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        backdrop-filter: blur(12px);
      }

      .language-switch {
        display: grid;
        grid-template-columns: repeat(2, 38px);
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(8, 11, 13, 0.62);
        backdrop-filter: blur(12px);
      }

      .language-button {
        min-width: 0;
        height: 28px;
        padding: 0;
        border: 0;
        border-radius: 4px;
        color: var(--muted);
        background: transparent;
        font: inherit;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        transition: color 150ms ease, background-color 150ms ease;
      }

      .language-button:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
      }

      .language-button.is-active {
        color: #07110f;
        background: var(--accent);
      }

      .language-button:focus-visible {
        outline: 2px solid var(--warm);
        outline-offset: 2px;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.08;
        letter-spacing: 0;
      }

      h1 {
        max-width: 780px;
        margin-top: 22px;
        font-size: clamp(38px, 6vw, 68px);
        font-weight: 760;
      }

      .hero p {
        max-width: 760px;
        margin: 20px 0 0;
        font-size: 18px;
        line-height: 1.65;
        color: var(--muted);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 6px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button-primary {
        color: #07110f;
        background: var(--accent);
        box-shadow: 0 8px 24px rgba(83, 214, 197, 0.18);
      }

      .button-primary:hover {
        background: #6ce6d7;
      }

      .button-secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.035);
      }

      .button-secondary:hover {
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.07);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 34px;
      }

      .meta-item {
        min-width: 0;
        min-height: 100px;
        padding: 16px 17px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.035);
        backdrop-filter: blur(12px);
      }

      .meta-label {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .meta-value {
        margin-top: 8px;
        font-size: 19px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .meta-item:nth-child(3) {
        border-color: rgba(241, 189, 99, 0.38);
        background: rgba(241, 189, 99, 0.07);
      }

      .meta-item:nth-child(3) .meta-label,
      .meta-item:nth-child(3) .meta-value {
        color: var(--warm);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        align-items: start;
        min-width: 0;
        gap: 18px;
        margin-top: 18px;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .panel-main {
        padding: 30px;
      }

      .panel-side {
        position: sticky;
        top: 18px;
        padding: 18px;
      }

      .section-block + .section-block {
        margin-top: 32px;
        padding-top: 32px;
        border-top: 1px solid var(--line);
      }

      h2 {
        font-size: clamp(26px, 3vw, 38px);
        margin-bottom: 16px;
        font-weight: 740;
      }

      .section-body {
        min-width: 0;
        font-size: 16px;
        line-height: 1.75;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .section-body p {
        margin: 0 0 14px;
      }

      .section-body p[style*="color:#dc2626"] {
        margin: 18px 0 0;
        padding: 14px 16px;
        border: 1px solid rgba(255, 140, 140, 0.28);
        border-left: 3px solid var(--danger);
        border-radius: 6px;
        color: var(--danger) !important;
        background: rgba(255, 140, 140, 0.07);
      }

      .section-body ul,
      .section-body ol {
        margin: 12px 0 0;
        padding-left: 20px;
      }

      .section-body li + li {
        margin-top: 8px;
      }

      .section-body code,
      .tip code {
        padding: 3px 6px;
        border: 1px solid rgba(83, 214, 197, 0.13);
        border-radius: 4px;
        color: #8be5da;
        background: rgba(83, 214, 197, 0.07);
        font-family: "Cascadia Code", Consolas, "Courier New", monospace;
        font-size: 0.92em;
      }

      .section-body pre {
        position: relative;
        max-width: 100%;
        margin: 18px 0;
        padding: 20px;
        overflow-x: auto;
        border: 1px solid rgba(83, 214, 197, 0.2);
        border-left: 3px solid var(--accent-strong);
        border-radius: 6px;
        background: #0a0e11;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      }

      .section-body pre code {
        display: block;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #d4e2e5;
        font-size: 13px;
        line-height: 1.65;
        white-space: pre;
      }

      .side-title {
        margin: 0 0 12px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .side-list,
      .mini-list {
        display: grid;
        gap: 10px;
      }

      .side-link,
      .tip {
        display: block;
        padding: 14px 15px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.025);
        text-decoration: none;
        transition: border-color 160ms ease, background-color 160ms ease, transform 160ms ease;
      }

      .side-link:hover {
        transform: translateX(3px);
        border-color: var(--line-strong);
        background: rgba(83, 214, 197, 0.055);
      }

      .side-link strong,
      .tip strong {
        display: block;
        font-size: 16px;
      }

      .side-link span,
      .tip span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      @media (max-width: 920px) {
        .hero {
          padding-right: 32px;
          padding-top: 86px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .panel-side {
          position: static;
        }

        .meta-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 1180px);
          padding: 10px 0 32px;
        }

        .hero,
        .panel-main,
        .panel-side {
          padding: 18px;
        }

        .hero {
          padding-top: 76px;
        }

        .hero-tools {
          top: 16px;
          left: 18px;
          right: 18px;
          justify-content: space-between;
        }

        h1 {
          font-size: 36px;
        }

        .hero p {
          font-size: 16px;
        }

        .hero-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .meta-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .meta-item {
          min-height: 108px;
          padding: 14px;
        }

        .meta-value {
          font-size: 16px;
        }

        .section-body pre {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-tools">
          <div class="author-badge" id="author-badge"></div>
          <div class="language-switch" aria-label="Language">
            <button class="language-button" type="button" data-language="ru">RU</button>
            <button class="language-button" type="button" data-language="en">EN</button>
          </div>
        </div>
        <div class="eyebrow" id="eyebrow"></div>
        <h1 id="title"></h1>
        <p id="subtitle"></p>
        <div class="hero-actions">
          <a class="button button-primary" id="primary-link" href="#"></a>
          <a class="button button-secondary" id="secondary-link" href="#instructions"></a>
        </div>
        <div class="meta-grid" id="meta-grid"></div>
      </section>

      <section class="layout">
        <article class="panel panel-main">
          <div id="instructions"></div>
        </article>

        <aside class="panel panel-side">
          <p class="side-title" id="quick-links-title"></p>
          <div class="side-list" id="quick-links"></div>
        </aside>
      </section>
    </main>

    <script src="./site-content.js?v=20260712-3"></script>
    <script>
      const guides = {
        ru: window.BUYER_GUIDE,
        en: window.BUYER_GUIDE_EN,
      };
      let content = guides.ru;

      function createElement(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (typeof text === "string") node.textContent = text;
        return node;
      }

      function renderMeta(items) {
        const host = document.getElementById("meta-grid");
        host.innerHTML = "";
        items.forEach((item) => {
          const card = createElement("div", "meta-item");
          card.appendChild(createElement("div", "meta-label", item.label));
          card.appendChild(createElement("div", "meta-value", item.value));
          host.appendChild(card);
        });
      }

      function renderSections(sections) {
        const host = document.getElementById("instructions");
        const quickLinks = document.getElementById("quick-links");
        host.innerHTML = "";
        quickLinks.innerHTML = "";

        sections.forEach((section) => {
          const block = createElement("section", "section-block");
          block.id = section.id;
          block.appendChild(createElement("h2", "", section.title));

          const body = createElement("div", "section-body");
          body.innerHTML = section.html;
          block.appendChild(body);
          host.appendChild(block);

          const link = createElement("a", "side-link");
          link.href = `#${section.id}`;
          link.innerHTML = `<strong>${section.title}</strong><span>${section.note}</span>`;
          quickLinks.appendChild(link);
        });
      }

      function saveLanguage(language) {
        try {
          localStorage.setItem("buyer-guide-language", language);
        } catch (_) {}
      }

      function getSavedLanguage() {
        try {
          return localStorage.getItem("buyer-guide-language");
        } catch (_) {
          return null;
        }
      }

      function renderContent(language) {
        content = guides[language] || guides.ru;
        document.documentElement.lang = content.lang;
        document.title = content.pageTitle;
        document.getElementById("author-badge").textContent = content.author
          ? `${content.authorLabel}: ${content.author}`
          : "";
        document.getElementById("eyebrow").textContent = content.eyebrow;
        document.getElementById("title").textContent = content.title;
        document.getElementById("subtitle").textContent = content.subtitle;
        document.getElementById("primary-link").textContent = content.primaryAction.label;
        document.getElementById("primary-link").href = content.primaryAction.href;
        document.getElementById("secondary-link").textContent = content.secondaryActionLabel;
        document.getElementById("quick-links-title").textContent = content.quickLinksTitle;

        document.querySelectorAll("[data-language]").forEach((button) => {
          const isActive = button.dataset.language === content.lang;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        renderMeta(content.meta);
        renderSections(content.sections);
        saveLanguage(content.lang);
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => renderContent(button.dataset.language));
      });

      const initialLanguage = guides[getSavedLanguage()] ? getSavedLanguage() : "ru";
      renderContent(initialLanguage);
    </script>
  </body>
</html>
